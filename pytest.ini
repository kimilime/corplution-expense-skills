[pytest]
# tmp/ holds historical review snapshots (e.g. tmp/review-v2.6.1-*) whose stale
# copies of the skill scripts + tests reference old interfaces and old subagent
# role names. Collecting them from the repo root produced spurious failures that
# masked real signal, so exclude tmp/ from recursion. This does not set
# testpaths, so genuine tests anywhere else are still discovered.
norecursedirs = tmp .git .* build dist *.egg node_modules venv
